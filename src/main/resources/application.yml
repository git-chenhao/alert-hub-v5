spring:
  application:
    name: alert-hub-v5

  # 数据源配置 - 默认使用 H2 内存数据库
  datasource:
    url: jdbc:h2:mem:alerthub;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # H2 控制台（仅用于开发环境）
  h2:
    console:
      enabled: true
      path: /h2-console

  # Thymeleaf 配置
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  # Jackson JSON 配置
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

  # 缓存配置
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=300s

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# Alert Hub 自定义配置
alerthub:
  # CORS 配置
  cors:
    allowed-origins: "*"  # 生产环境应配置具体的域名，如: "https://example.com,https://api.example.com"

  # 安全配置
  security:
    enabled: true
    admin-username: admin
    admin-password: ${ALERTHUB_ADMIN_PASSWORD:}  # 必须通过环境变量设置，否则启动时会生成随机密码

  # 告警去重配置
  deduplication:
    enabled: true
    cache-ttl: 300  # 秒
    max-cache-size: 10000

  # 批量聚合配置
  aggregation:
    enabled: true
    window-size: 60  # 秒
    max-batch-size: 100

  # 飞书通知配置
  feishu:
    enabled: false
    webhook-url: https://open.feishu.cn/open-apis/bot/v2/hook/your-webhook-token
    secret: your-secret-key

  # 调度分析配置（A2A 协议）
  scheduler:
    enabled: true
    initial-delay: 10000  # 毫秒
    fixed-rate: 60000  # 毫秒

# 日志配置
logging:
  level:
    root: INFO
    com.alerthub: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
