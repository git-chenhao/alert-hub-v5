spring:
  application:
    name: alert-hub-v5

  # Database Configuration (H2 for development)
  datasource:
    url: jdbc:h2:mem:alerthub;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080

# Alert Hub Configuration
alerthub:
  # Aggregation time window (in minutes): 1, 5, 10, 30
  aggregation:
    window-minutes: 5
    enabled: true

  # Deduplication cache TTL (in minutes)
  deduplication:
    cache-ttl-minutes: 60

  # A2A Analysis Service Configuration
  analysis:
    enabled: false
    endpoint: http://localhost:8081/api/analyze
    timeout-seconds: 30

  # Feishu Notification Configuration
  notification:
    feishu:
      enabled: false
      webhook-url: ${FEISHU_WEBHOOK_URL:}
      # Notify only for alerts with severity >= configured level
      min-severity: MEDIUM

# Logging Configuration
logging:
  level:
    root: INFO
    com.alerthub: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
