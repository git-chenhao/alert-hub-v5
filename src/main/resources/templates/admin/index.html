<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert Hub V5 - 统一告警聚合平台</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; color: #333; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px 0; margin-bottom: 30px; }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-card h3 { font-size: 14px; color: #666; margin-bottom: 10px; text-transform: uppercase; }
        .stat-card .value { font-size: 36px; font-weight: bold; color: #667eea; }
        .stat-card.pending .value { color: #f59e0b; }
        .stat-card.sent .value { color: #10b981; }
        .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card h2 { font-size: 20px; margin-bottom: 20px; color: #333; }
        .alert-item { padding: 15px; border-left: 4px solid #667eea; background: #f8f9fa; margin-bottom: 10px; border-radius: 4px; }
        .alert-item.critical { border-left-color: #ef4444; background: #fef2f2; }
        .alert-item.warning { border-left-color: #f59e0b; background: #fffbeb; }
        .alert-item.info { border-left-color: #3b82f6; background: #eff6ff; }
        .alert-title { font-weight: 600; margin-bottom: 5px; }
        .alert-meta { font-size: 12px; color: #666; }
        .batch-item { padding: 15px; background: #f8f9fa; margin-bottom: 10px; border-radius: 4px; }
        .batch-no { font-weight: 600; color: #667eea; margin-bottom: 5px; }
        .batch-stats { font-size: 14px; color: #666; }
        .nav { margin-top: 20px; }
        .nav a { color: white; text-decoration: none; margin-right: 20px; opacity: 0.9; }
        .nav a:hover { opacity: 1; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h1>🚨 Alert Hub V5</h1>
            <p>统一告警聚合平台 - 接收、去重、聚合、通知</p>
            <div class="nav">
                <a href="/admin">📊 仪表盘</a>
                <a href="/admin/alerts">📋 告警列表</a>
                <a href="/admin/batches">📦 批次列表</a>
                <a href="/h2-console" target="_blank">🗄️ 数据库</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>总告警数</h3>
                <div class="value" th:text="${totalAlerts}">0</div>
            </div>
            <div class="stat-card pending">
                <h3>待处理告警</h3>
                <div class="value" th:text="${pendingAlerts}">0</div>
            </div>
            <div class="stat-card">
                <h3>总批次数</h3>
                <div class="value" th:text="${totalBatches}">0</div>
            </div>
            <div class="stat-card sent">
                <h3>已发送批次</h3>
                <div class="value" th:text="${sentBatches}">0</div>
            </div>
        </div>

        <div class="content-grid">
            <div class="card">
                <h2>最近告警</h2>
                <div th:if="${recentAlerts.isEmpty()}" style="text-align: center; color: #999; padding: 40px;">
                    暂无告警
                </div>
                <div th:each="alert : ${recentAlerts}" class="alert-item" th:classappend="${alert.severity}">
                    <div class="alert-title" th:text="${alert.title}">告警标题</div>
                    <div class="alert-meta">
                        来源: <span th:text="${alert.source}">unknown</span> |
                        级别: <span th:text="${alert.severity}">info</span> |
                        时间: <span th:text="${#temporals.format(alert.createdAt, 'yyyy-MM-dd HH:mm:ss')}">2024-01-01 00:00:00</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>最近批次</h2>
                <div th:if="${recentBatches.isEmpty()}" style="text-align: center; color: #999; padding: 40px;">
                    暂无批次
                </div>
                <div th:each="batch : ${recentBatches}" class="batch-item">
                    <div class="batch-no" th:text="${batch.batchNo}">BATCH-001</div>
                    <div class="batch-stats">
                        告警数: <span th:text="${batch.alertCount}">0</span> |
                        状态: <span th:text="${batch.status}">pending</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
