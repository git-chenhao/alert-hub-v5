<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>告警详情 - Alert Hub V5</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px 0; margin-bottom: 30px; }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .nav { margin-top: 20px; }
        .nav a { color: white; text-decoration: none; margin-right: 20px; opacity: 0.9; }
        .nav a:hover { opacity: 1; text-decoration: underline; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .card h2 { font-size: 18px; margin-bottom: 20px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .detail-grid { display: grid; grid-template-columns: 150px 1fr; gap: 15px; }
        .detail-label { font-weight: 600; color: #666; }
        .detail-value { color: #333; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; display: inline-block; }
        .badge.critical { background: #fee2e2; color: #dc2626; }
        .badge.warning { background: #fef3c7; color: #d97706; }
        .badge.info { background: #dbeafe; color: #2563eb; }
        .badge.pending { background: #e0e7ff; color: #4f46e5; }
        .badge.aggregated { background: #fce7f3; color: #db2777; }
        .badge.sent { background: #d1fae5; color: #059669; }
        .badge.resolved { background: #f3f4f6; color: #6b7280; }
        .status-form { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        .status-form select, .status-form button { padding: 10px 15px; border: 1px solid #ddd; border-radius: 6px; margin-right: 10px; }
        .status-form button { background: #667eea; color: white; border: none; cursor: pointer; }
        .status-form button:hover { background: #5a67d8; }
        .back-link { display: inline-block; margin-top: 20px; color: #667eea; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .json-content { background: #f8f9fa; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 13px; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; }
        .alert-message { padding: 10px 15px; border-radius: 6px; margin-top: 10px; display: none; }
        .alert-message.success { background: #d1fae5; color: #059669; }
        .alert-message.error { background: #fee2e2; color: #dc2626; }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h1>🔍 告警详情</h1>
            <div class="nav">
                <a href="/admin">📊 仪表盘</a>
                <a href="/admin/alerts">📋 告警列表</a>
                <a href="/admin/batches">📦 批次列表</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2>基本信息</h2>
            <div class="detail-grid">
                <div class="detail-label">ID:</div>
                <div class="detail-value" th:text="${alert.id}">1</div>

                <div class="detail-label">标题:</div>
                <div class="detail-value" th:text="${alert.title}">告警标题</div>

                <div class="detail-label">来源:</div>
                <div class="detail-value" th:text="${alert.source}">unknown</div>

                <div class="detail-label">级别:</div>
                <div class="detail-value">
                    <span class="badge" th:classappend="${alert.severity}" th:text="${alert.severity}">info</span>
                </div>

                <div class="detail-label">状态:</div>
                <div class="detail-value">
                    <span class="badge" th:classappend="${alert.status}" th:text="${alert.status}">pending</span>
                </div>

                <div class="detail-label">指纹:</div>
                <div class="detail-value" th:text="${alert.fingerprint}" style="font-family: monospace; font-size: 12px;">fingerprint</div>

                <div class="detail-label">创建时间:</div>
                <div class="detail-value" th:text="${#temporals.format(alert.createdAt, 'yyyy-MM-dd HH:mm:ss')}">2024-01-01 00:00:00</div>

                <div class="detail-label">更新时间:</div>
                <div class="detail-value" th:text="${#temporals.format(alert.updatedAt, 'yyyy-MM-dd HH:mm:ss')}">2024-01-01 00:00:00</div>

                <div class="detail-label">发送次数:</div>
                <div class="detail-value" th:text="${alert.sendCount}">0</div>

                <div class="detail-label" th:if="${alert.batchId != null}">所属批次:</div>
                <div class="detail-value" th:if="${alert.batchId != null}">
                    <a th:href="@{/admin/batches}">批次 #<span th:text="${alert.batchId}">1</span></a>
                </div>
            </div>

            <div class="status-form">
                <label for="status">更新状态:</label>
                <select id="status">
                    <option value="pending" th:selected="${alert.status == 'pending'}">pending</option>
                    <option value="aggregated" th:selected="${alert.status == 'aggregated'}">aggregated</option>
                    <option value="sent" th:selected="${alert.status == 'sent'}">sent</option>
                    <option value="resolved" th:selected="${alert.status == 'resolved'}">resolved</option>
                </select>
                <button onclick="updateStatus()">更新</button>
                <div id="statusMessage" class="alert-message"></div>
            </div>
        </div>

        <div class="card" th:if="${alert.content != null and !alert.content.empty}">
            <h2>告警内容</h2>
            <div class="json-content" th:text="${alert.content}">告警内容</div>
        </div>

        <div class="card" th:if="${alert.labels != null and !alert.labels.empty}">
            <h2>标签 (Labels)</h2>
            <div class="json-content" th:text="${alert.labels}">{}</div>
        </div>

        <div class="card" th:if="${alert.annotations != null and !alert.annotations.empty}">
            <h2>注解 (Annotations)</h2>
            <div class="json-content" th:text="${alert.annotations}">{}</div>
        </div>

        <div class="card" th:if="${alert.extra != null and !alert.extra.empty}">
            <h2>扩展信息</h2>
            <div class="json-content" th:text="${alert.extra}">{}</div>
        </div>

        <a href="/admin/alerts" class="back-link">← 返回告警列表</a>
    </div>

    <script>
        function updateStatus() {
            var status = document.getElementById('status').value;
            var alertId = '[[${alert.id}]]';
            var messageDiv = document.getElementById('statusMessage');

            fetch('/admin/alerts/' + alertId + '/status', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'status=' + encodeURIComponent(status)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    messageDiv.textContent = data.message;
                    messageDiv.className = 'alert-message success';
                    messageDiv.style.display = 'block';
                    setTimeout(function() {
                        location.reload();
                    }, 1000);
                } else {
                    messageDiv.textContent = data.message || '更新失败';
                    messageDiv.className = 'alert-message error';
                    messageDiv.style.display = 'block';
                }
            })
            .catch(error => {
                messageDiv.textContent = '请求失败: ' + error;
                messageDiv.className = 'alert-message error';
                messageDiv.style.display = 'block';
            });
        }
    </script>
</body>
</html>
