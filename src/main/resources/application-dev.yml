spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:file:./data/alerthub;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

# Development settings
alerthub:
  aggregation:
    window-minutes: 1
    enabled: true

  analysis:
    enabled: false

  notification:
    feishu:
      enabled: false
      min-severity: LOW

logging:
  level:
    root: INFO
    com.alerthub: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
