# 开发环境配置
spring:
  datasource:
    url: jdbc:h2:mem:alerthub_dev;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true

logging:
  level:
    com.alerthub: DEBUG
    org.springframework.web: DEBUG

