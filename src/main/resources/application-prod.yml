# 生产环境配置 - 使用 MySQL
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/alerthub?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: alerthub
    password: ${DB_PASSWORD:alerthub123}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  h2:
    console:
      enabled: false

  thymeleaf:
    cache: true

# 生产环境告警配置
alerthub:
  # CORS 配置 - 生产环境使用环境变量配置允许的域名
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}  # 例如: https://example.com,https://admin.example.com

  # 安全配置 - 生产环境必须通过环境变量设置密码
  security:
    enabled: true
    admin-username: ${ALERTHUB_ADMIN_USERNAME:admin}
    admin-password: ${ALERTHUB_ADMIN_PASSWORD:}  # 必须设置，否则启动失败

  deduplication:
    cache-ttl: 600
    max-cache-size: 50000

  aggregation:
    window-size: 120
    max-batch-size: 200

  feishu:
    enabled: true

logging:
  level:
    root: WARN
    com.alerthub: INFO
