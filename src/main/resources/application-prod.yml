# 生产环境配置 - 使用 MySQL
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/alerthub?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: alerthub
    password: ${DB_PASSWORD:alerthub123}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  h2:
    console:
      enabled: false

  thymeleaf:
    cache: true

# 生产环境告警配置
alerthub:
  deduplication:
    cache-ttl: 600
    max-cache-size: 50000

  aggregation:
    window-size: 120
    max-batch-size: 200

  feishu:
    enabled: true

logging:
  level:
    root: WARN
    com.alerthub: INFO
